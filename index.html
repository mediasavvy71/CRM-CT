<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --primary: #1F2A44;
    --primary-hover: #2C3B5F;
    --accent: #3B82F6;
    --accent-hover: #2563EB;
    --danger: #DC2626;
    --danger-hover: #B91C1C;
    --bg: #F4F6FA;
    --card: #FFFFFF;
    --muted: #6B7280;
    --border: #E5E7EB;
    --green: #10B981;
    --amber: #F59E0B;
    --purple: #8B5CF6;
    --gray: #9CA3AF;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--primary);
  }
  #app { display: flex; height: 100vh; }

  /* Sidebar */
  #sidebar {
    width: 220px; flex-shrink: 0; background: var(--primary);
    color: white; display: flex; flex-direction: column; padding: 24px 0;
    overflow-y: auto;
  }
  #sidebar .brand { padding: 0 20px 4px; }
  #sidebar .brand .name { font-size: 20px; font-weight: 700; }
  #sidebar .brand .sub { font-size: 13px; color: #93A3C4; margin-bottom: 20px; }
  #sidebar nav { display: flex; flex-direction: column; gap: 2px; padding: 0 12px; }
  #sidebar nav button {
    all: unset; cursor: pointer; padding: 9px 12px; border-radius: 6px;
    font-size: 14px; color: white; display: block;
  }
  #sidebar nav button:hover { background: var(--primary-hover); }
  #sidebar nav button.active { background: var(--primary-hover); }
  #sidebar .footer {
    margin-top: auto; padding: 16px 20px 0; font-size: 10px; color: #5B6B8C; line-height: 1.4;
  }

  /* Content */
  #content { flex: 1; overflow-y: auto; }
  .header { padding: 24px 28px 8px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .header h1 { margin: 0; font-size: 24px; font-weight: 700; }
  .header p { margin: 4px 0 0; font-size: 13px; color: var(--muted); }

  .toolbar { display: flex; gap: 8px; padding: 0 28px 8px; align-items: center; flex-wrap: wrap; }
  .toolbar .spacer { flex: 1; }

  input[type=text], input[type=search], input[type=email], input[type=tel], input[type=url],
  input[type=number], input[type=date], select, textarea {
    font-family: inherit; font-size: 13px; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 6px; background: white; color: var(--primary);
  }
  textarea { resize: vertical; width: 100%; }

  button.btn {
    all: unset; cursor: pointer; font-size: 13px; font-weight: 600; padding: 8px 14px;
    border-radius: 6px; color: white; background: var(--accent); text-align: center;
  }
  button.btn:hover { background: var(--accent-hover); }
  button.btn.secondary { background: #9CA3AF; }
  button.btn.secondary:hover { background: #6B7280; }
  button.btn.danger { background: var(--danger); }
  button.btn.danger:hover { background: var(--danger-hover); }
  button.btn.small { padding: 6px 10px; font-size: 12px; }
  button.btn.tiny { padding: 3px 7px; font-size: 11px; }
  button.btn.outline { background: white; color: var(--primary); border: 1px solid var(--border); }
  button.btn.outline:hover { background: #F0F2F6; }
  button.btn.toggle-off { background: white; color: var(--muted); border: 1px solid var(--border); }

  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 8px 28px; }
  .metric-card {
    background: var(--card); border-radius: 10px; padding: 16px 18px;
  }
  .metric-card .value { font-size: 26px; font-weight: 700; }
  .metric-card .label { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .mini-stats-strip {
    display: flex; flex-wrap: wrap; gap: 6px 22px; padding: 2px 28px 18px; font-size: 12px; color: var(--muted);
  }
  .mini-stats-strip .stat strong { color: var(--muted); font-weight: 700; font-size: 13px; }

  .body-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px 28px 20px; align-items: start;
  }
  .body-grid.orgs-grid { grid-template-columns: 3fr 2fr; }
  .body-grid.three-col { grid-template-columns: 1fr 1fr 1fr; }
  .body-grid.single { grid-template-columns: 1fr; }
  .body-grid.dash-main { grid-template-columns: 2fr 1fr; align-items: stretch; }
  .body-grid.dash-main .dash-left { display: flex; flex-direction: column; gap: 12px; }
  .body-grid.dash-main .dash-right { display: flex; flex-direction: column; }
  .body-grid.dash-main .dash-right .card { flex: 1; display: flex; flex-direction: column; }
  .body-grid.dash-main .dash-right .todo-list { flex: 1; max-height: none; }

  .todo-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
  .todo-item {
    font-size: 12px; padding: 7px 8px; border-radius: 8px; cursor: pointer;
    border: 1px solid transparent; transition: background 0.12s ease, border-color 0.12s ease;
  }
  .todo-item:hover { background: #F5F7FB; border-color: var(--border); }
  .todo-item:active { background: #EEF1F7; }
  .todo-item + .todo-item { margin-top: 0; }
  .todo-item .todo-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .todo-item .todo-desc { font-weight: 600; }
  .todo-item .todo-date { white-space: nowrap; color: var(--muted); flex-shrink: 0; }
  .todo-item .todo-date.overdue { color: var(--danger); font-weight: 700; }
  .todo-item .todo-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; color: var(--muted); }
  .todo-type-pill {
    display: inline-block; padding: 2px 9px; border-radius: 100px; font-size: 10px;
    font-weight: 700; color: white; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.02em;
  }
  .todo-meta .todo-who { color: var(--muted); }

  .card { background: var(--card); border-radius: 10px; padding: 14px 16px; }
  .card h3 { margin: 0 0 8px; font-size: 15px; font-weight: 700; }
  .list-row {
    display: flex; justify-content: space-between; padding: 3px 0; font-size: 13px;
  }
  .list-row .l { color: var(--muted); }
  .list-row .r { font-weight: 600; }
  .list-row.clickable {
    cursor: pointer; border-radius: 6px; padding: 4px 6px; margin: 0 -6px;
    border: 1px solid transparent; transition: background 0.12s ease, border-color 0.12s ease;
  }
  .list-row.clickable:hover { background: #F5F7FB; border-color: var(--border); }
  .list-row.clickable:active { background: #EEF1F7; }
  .muted-note { color: var(--muted); font-size: 13px; padding: 8px 0; }

  table.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data-table th {
    text-align: left; font-weight: 700; padding: 8px 10px; border-bottom: 2px solid var(--border);
    background: #FAFBFD; position: sticky; top: 0;
  }
  table.data-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
  table.data-table tbody tr { cursor: pointer; }
  table.data-table tbody tr:hover { background: #F5F7FB; }
  table.data-table tbody tr.selected { background: #E7EEFF; }
  .table-wrap { max-height: 520px; overflow-y: auto; border-radius: 8px; }

  .detail-empty { color: var(--muted); font-size: 13px; padding: 20px 4px; }
  .detail-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
  .detail-actions { display: flex; gap: 8px; margin-bottom: 10px; }
  .detail-field { display: flex; padding: 2px 0; font-size: 12px; }
  .detail-field .label { width: 100px; color: var(--muted); flex-shrink: 0; }
  .detail-field .value { color: var(--primary); }
  .detail-section-title { font-size: 13px; font-weight: 700; margin: 12px 0 4px; }
  .notes-box {
    background: var(--bg); border-radius: 6px; padding: 8px 10px; font-size: 12px;
    white-space: pre-wrap; min-height: 30px;
  }
  .contact-mini-row { display: flex; justify-content: space-between; padding: 2px 0; font-size: 12px; }

  /* Badges */
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px;
    font-weight: 700; color: white; white-space: nowrap;
  }

  /* Kanban */
  .kanban-board { display: flex; gap: 12px; padding: 4px 28px 20px; overflow-x: auto; align-items: flex-start; }
  .kanban-col { flex: 1 0 210px; min-width: 210px; background: #EEF1F7; border-radius: 10px; padding: 10px; max-height: 640px; display: flex; flex-direction: column; }
  .kanban-col-header { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 700; margin-bottom: 8px; padding: 0 2px; }
  .kanban-col-header .count { background: white; border-radius: 100px; padding: 1px 8px; font-size: 11px; color: var(--muted); }
  .kanban-cards { overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .kanban-card { background: white; border-radius: 8px; padding: 10px; font-size: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); cursor: pointer; }
  .kanban-card .name { font-weight: 700; margin-bottom: 2px; }
  .kanban-card .org { color: var(--muted); margin-bottom: 6px; }
  .kanban-card .amount { font-weight: 700; color: var(--accent); }
  .kanban-card .prob { color: var(--muted); float: right; }
  .kanban-card select { width: 100%; margin-top: 6px; font-size: 11px; padding: 4px 6px; }
  .kanban-card-actions { display: flex; gap: 6px; margin-top: 6px; }

  .forecast-bar { display: flex; gap: 12px; padding: 0 28px 12px; flex-wrap: wrap; }
  .forecast-chip { background: var(--card); border-radius: 8px; padding: 10px 16px; font-size: 12px; }
  .forecast-chip .v { font-size: 18px; font-weight: 700; display: block; }

  .pipeline-tabs { display: flex; gap: 6px; padding: 0 28px 10px; flex-wrap: wrap; }
  .card-caption { font-size: 11px; color: var(--muted); margin: -4px 0 8px; }

  /* Progress bar */
  .progress-track { background: var(--bg); border-radius: 100px; height: 8px; overflow: hidden; margin: 4px 0; }
  .progress-fill { background: var(--accent); height: 100%; border-radius: 100px; }

  /* Milestones */
  .milestone-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
  .milestone-row.done .m-title { text-decoration: line-through; color: var(--muted); }
  .milestone-row .m-title { flex: 1; }
  .milestone-row .m-date { color: var(--muted); font-size: 11px; }

  /* Pilot cards */
  .pilot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; padding: 4px 28px 20px; }
  .pilot-card { background: var(--card); border-radius: 10px; padding: 14px 16px; }
  .pilot-card .top-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .pilot-card .name { font-weight: 700; font-size: 14px; }
  .pilot-card .org { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
  .pilot-card .stat-line { font-size: 12px; color: var(--muted); margin-top: 8px; }
  .pilot-card .actions { display: flex; gap: 6px; margin-top: 10px; }

  /* Follow-up groups */
  .fu-group-title { font-size: 13px; font-weight: 700; padding: 12px 28px 4px; display: flex; align-items: center; gap: 8px; }
  .fu-group-title .count-pill { background: var(--border); border-radius: 100px; padding: 1px 8px; font-size: 11px; color: var(--primary); }
  .fu-group-title.overdue .count-pill { background: #FEE2E2; color: var(--danger); }
  .fu-group-title.today .count-pill { background: #FEF3C7; color: #92400E; }
  .fu-list { padding: 0 28px; display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .fu-item { background: var(--card); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .fu-item.done { opacity: 0.6; }
  .fu-item.done .fu-desc { text-decoration: line-through; }
  .fu-item .fu-desc { flex: 1; }
  .fu-item .fu-meta { color: var(--muted); font-size: 11px; white-space: nowrap; }
  .fu-item input[type=checkbox] { width: 16px; height: 16px; }

  /* Reports */
  .report-section { padding: 0 28px 20px; }
  .chart-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; font-size: 12px; }
  .chart-row .chart-label { width: 130px; flex-shrink: 0; color: var(--muted); }
  .chart-row .chart-track { flex: 1; background: var(--bg); border-radius: 6px; height: 18px; overflow: hidden; }
  .chart-row .chart-fill { background: var(--accent); height: 100%; border-radius: 6px; }
  .chart-row .chart-value { width: 90px; text-align: right; font-weight: 600; flex-shrink: 0; }
  .reports-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Modal */
  #modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(15, 20, 35, 0.45);
    align-items: center; justify-content: center; z-index: 50;
  }
  #modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 12px; width: 440px; max-height: 88vh; overflow-y: auto;
    padding: 20px 20px 16px;
  }
  .modal.wide { width: 520px; }
  .modal h2 { margin: 0 0 14px; font-size: 17px; }
  .field-group { margin-bottom: 10px; }
  .field-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .field-group input, .field-group select, .field-group textarea { width: 100%; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field-group { flex: 1; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-top: 4px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-actions button { flex: 1; }

  .toast {
    position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white;
    padding: 10px 16px; border-radius: 8px; font-size: 13px; opacity: 0; transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s; z-index: 60; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .settings-block { padding: 0 28px 20px; max-width: 640px; }
  .settings-block .card { margin-bottom: 14px; }
  .settings-block p { font-size: 13px; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <div class="brand">
      <div class="name" style="margin-bottom: 20px;">My CRM</div>
    </div>
    <nav id="nav"></nav>
    <div class="footer">Data is saved automatically in this browser.<br>Export to Excel anytime for a backup.</div>
  </div>
  <div id="content"></div>
</div>

<div id="modal-overlay">
  <div class="modal" id="modal-body"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================ *
 * My CRM — single-file, no-install desktop web app.
 * Open this file directly in any modern browser. All data is
 * kept in this browser's localStorage and auto-saves on every
 * change. Use "Export to Excel" (Settings) to back up your data
 * to a real .xlsx file, and "Import from Excel" to restore it.
 * ============================================================ */

const STORAGE_KEY = "chronicTraceCRM_v2";
const ORG_TYPES = ["High School", "College", "Healthcare", "Enterprise", "Partnership", "Other"];

// HubSpot-style pipelines: each has its own ordered stages, default
// probabilities, colors, and which stage counts as "won" vs "lost".
// Opportunities carry a `pipeline` field and always belong to exactly one.
const PIPELINES = {
  "Sales": {
    stages: ["Prospecting", "Qualification", "Proposal Sent", "Negotiation", "Closed Won", "Closed Lost"],
    probabilities: { "Prospecting": 10, "Qualification": 25, "Proposal Sent": 50, "Negotiation": 75, "Closed Won": 100, "Closed Lost": 0 },
    colors: { "Prospecting": "var(--gray)", "Qualification": "var(--accent)", "Proposal Sent": "var(--amber)", "Negotiation": "var(--purple)", "Closed Won": "var(--green)", "Closed Lost": "var(--danger)" },
    won: "Closed Won", lost: "Closed Lost",
  },
  "Research": {
    stages: ["Idea", "Literature Review", "Study Design", "IRB Approval", "Data Collection", "Published", "Discontinued"],
    probabilities: { "Idea": 10, "Literature Review": 25, "Study Design": 40, "IRB Approval": 60, "Data Collection": 80, "Published": 100, "Discontinued": 0 },
    colors: { "Idea": "var(--gray)", "Literature Review": "var(--accent)", "Study Design": "var(--amber)", "IRB Approval": "var(--purple)", "Data Collection": "#0EA5E9", "Published": "var(--green)", "Discontinued": "var(--danger)" },
    won: "Published", lost: "Discontinued",
  },
  "Partnership": {
    stages: ["Prospecting", "Discussions", "Agreement Drafting", "Active", "Ended"],
    probabilities: { "Prospecting": 10, "Discussions": 30, "Agreement Drafting": 60, "Active": 100, "Ended": 0 },
    colors: { "Prospecting": "var(--gray)", "Discussions": "var(--accent)", "Agreement Drafting": "var(--amber)", "Active": "var(--green)", "Ended": "var(--danger)" },
    won: "Active", lost: "Ended",
  },
  "Funding": {
    stages: ["Researching", "Preparing Application", "Applied", "Awarded", "Declined"],
    probabilities: { "Researching": 10, "Preparing Application": 30, "Applied": 60, "Awarded": 100, "Declined": 0 },
    colors: { "Researching": "var(--gray)", "Preparing Application": "var(--accent)", "Applied": "var(--amber)", "Awarded": "var(--green)", "Declined": "var(--danger)" },
    won: "Awarded", lost: "Declined",
  },
  "Feedback": {
    stages: ["Collected", "Under Review", "Actioned", "Published", "Archived"],
    probabilities: { "Collected": 20, "Under Review": 40, "Actioned": 70, "Published": 100, "Archived": 0 },
    colors: { "Collected": "var(--gray)", "Under Review": "var(--accent)", "Actioned": "var(--amber)", "Published": "var(--green)", "Archived": "var(--danger)" },
    won: "Published", lost: "Archived",
  },
};
const PIPELINE_NAMES = Object.keys(PIPELINES);
function pipelineOf(name) { return PIPELINES[name] || PIPELINES["Sales"]; }
function defaultProbability(pipeline, stage) {
  const v = pipelineOf(pipeline).probabilities[stage];
  return v === undefined ? 0 : v;
}
function stageColor(pipeline, stage) { return pipelineOf(pipeline).colors[stage] || "var(--gray)"; }

const ACTIVITY_TYPES = ["Call", "Email", "Meeting", "Demo"];
const TODO_TYPE_COLORS = {
  "Call": "var(--primary)", "Email": "var(--accent)", "Meeting": "var(--purple)",
  "Demo": "var(--amber)", "Follow Up": "var(--green)",
};
function todoTypeColor(typeLabel) { return TODO_TYPE_COLORS[typeLabel] || "var(--gray)"; }
const PILOT_STATUS = ["Planning", "Active", "Completed", "Paused"];
const PILOT_STATUS_COLORS = { "Planning": "var(--gray)", "Active": "var(--accent)", "Completed": "var(--green)", "Paused": "var(--amber)" };
const PARTNERSHIP_TYPES = ["Curriculum", "Clinical", "Technology", "Distribution", "Other"];
const PARTNERSHIP_STATUS = ["Prospecting", "Active", "Ended"];
const GRANT_STATUS = ["Researching", "Applied", "Awarded", "Declined"];
const GRANT_STATUS_COLORS = { "Researching": "var(--gray)", "Applied": "var(--accent)", "Awarded": "var(--green)", "Declined": "var(--danger)" };

const NAV_ITEMS = [
  { name: "Dashboard", enabled: true },
  { name: "Organizations", enabled: true },
  { name: "Contacts", enabled: true },
  { name: "Pipelines", enabled: true },
  { name: "Activities", enabled: true },
  { name: "Follow Ups", enabled: true },
  { name: "Pilot Programs", enabled: true },
  { name: "Partnerships", enabled: true },
  { name: "Grant Tracker", enabled: true },
  { name: "Automations", enabled: true },
  { name: "Reports", enabled: true },
  { name: "Settings", enabled: true },
];

// ---------------------------------------------------------------- //
// Utilities
// ---------------------------------------------------------------- //
function uid(prefix) {
  return prefix + "-" + Math.random().toString(16).slice(2, 10).toUpperCase();
}
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}
// Whole-day difference between two "YYYY-MM-DD" strings, computed in UTC so
// local timezone offsets don't shift the count by a day.
function daysBetween(fromDateStr, toDateStr) {
  const from = new Date(fromDateStr + "T00:00:00Z");
  const to = new Date(toDateStr + "T00:00:00Z");
  return Math.round((to.getTime() - from.getTime()) / 86400000);
}
function monthKey(dateStr) {
  if (!dateStr || dateStr.length < 7) return null;
  return dateStr.slice(0, 7);
}
function monthLabel(key) {
  if (!key) return "Unknown";
  const [y, m] = key.split("-");
  const names = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  return names[parseInt(m, 10) - 1] + " " + y;
}
function money(n) {
  const v = parseFloat(n) || 0;
  return "$" + v.toLocaleString(undefined, { maximumFractionDigits: 0 });
}
function escapeHtml(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function byId(id) { return document.getElementById(id); }
function showToast(msg) {
  const t = byId("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => t.classList.remove("show"), 2200);
}

// ---------------------------------------------------------------- //
// Store — all data access goes through here.
// ---------------------------------------------------------------- //
const Store = {
  state: null,

  load() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      try {
        this.state = JSON.parse(raw);
        this._ensureShape();
        return;
      } catch (e) { /* fall through to seed */ }
    }
    this.state = this._emptyState();
    this.seed();
    this.save();
  },

  _emptyState() {
    return {
      organizations: [], contacts: [], opportunities: [], activities: [],
      followUps: [], pilots: [], partnerships: [], grants: [], automationRules: [],
    };
  },

  _ensureShape() {
    const empty = this._emptyState();
    Object.keys(empty).forEach(k => { if (!Array.isArray(this.state[k])) this.state[k] = []; });
    // Migrate data saved before pipelines existed: default to "Sales".
    this.state.opportunities.forEach(o => {
      if (!o.pipeline || !PIPELINES[o.pipeline]) o.pipeline = "Sales";

  // ================= Organizations ================= //
  listOrganizations() { return this.state.organizations.slice(); },

  addOrganization(data) {
    const org = {
      id: uid("ORG"),
      name: data.name || "", type: data.type || "", industry: data.industry || "",
      address: data.address || "", city: data.city || "", state: data.state || "", zip: data.zip || "",
      phone: data.phone || "", website: data.website || "", notes: data.notes || "",
      createdDate: todayStr(), lastContactDate: data.lastContactDate || "",
    };
    this.state.organizations.push(org);
    this.save();
    return org.id;
  },

  updateOrganization(id, data) {
    const org = this.getOrganization(id);
    if (!org) throw new Error("Organization not found: " + id);
    Object.assign(org, data);
    if (data.name !== undefined) {
      this.state.contacts.forEach(c => { if (c.orgId === id) c.orgName = org.name; });
      this.state.opportunities.forEach(o => { if (o.orgId === id) o.orgName = org.name; });
      this.state.pilots.forEach(p => { if (p.orgId === id) p.orgName = org.name; });
      this.state.partnerships.forEach(p => { if (p.orgId === id) p.orgName = org.name; });
      this.state.grants.forEach(g => { if (g.orgId === id) g.orgName = org.name; });
    }
    this.save();
  },

  deleteOrganization(id) {
    this.state.organizations = this.state.organizations.filter(o => o.id !== id);
    const unlink = (arr, field, nameField) => arr.forEach(item => {
      if (item[field] === id) { item[field] = ""; if (nameField) item[nameField] = ""; }
    });
    unlink(this.state.contacts, "orgId", "orgName");
    unlink(this.state.opportunities, "orgId", "orgName");
    unlink(this.state.pilots, "orgId", "orgName");
    unlink(this.state.partnerships, "orgId", "orgName");
    unlink(this.state.grants, "orgId", "orgName");
    this.save();
  },

  listContacts() { return this.state.contacts.slice(); },
  getContact(id) { return this.state.contacts.find(c => c.id === id) || null; },
  contactsForOrg(orgId) { return this.state.contacts.filter(c => c.orgId === orgId); },

    };

    this.save();

  updateContact(id, data) {

    this.state.activities.forEach(a => { if (a.contactId === id) a.contactId = ""; });

  // ================= Opportunities ================= //
  listOpportunities() { return this.state.opportunities.slice(); },
  getOpportunity(id) { return this.state.opportunities.find(o => o.id === id) || null; },
  opportunitiesForOrg(orgId) { return this.state.opportunities.filter(o => o.orgId === orgId); },

  addOpportunity(data) {
    const org = data.orgId ? this.getOrganization(data.orgId) : null;
    const pipeline = data.pipeline && PIPELINES[data.pipeline] ? data.pipeline : "Sales";
    const stage = data.stage || pipelineOf(pipeline).stages[0];
    const opp = {
      id: uid("OPP"), orgId: data.orgId || "", orgName: org ? org.name : "",
      name: data.name || "", pipeline, stage,
      amount: parseFloat(data.amount) || 0,
      probability: data.probability !== undefined && data.probability !== "" ? parseFloat(data.probability) : defaultProbability(pipeline, stage),
      expectedCloseDate: data.expectedCloseDate || "", source: data.source || "",
      notes: data.notes || "", createdDate: todayStr(),
    };
    this.state.opportunities.push(opp);
    this.save();
    this._runStageAutomation(opp, null);
    return opp.id;
  },

  updateOpportunity(id, data) {
    const o = this.getOpportunity(id);
    if (!o) throw new Error("Opportunity not found: " + id);
    const previousStage = o.stage;
    const next = Object.assign({}, data);
    if (next.amount !== undefined) next.amount = parseFloat(next.amount) || 0;
    if (next.probability !== undefined) next.probability = parseFloat(next.probability) || 0;
    Object.assign(o, next);
    if (data.orgId !== undefined) {
      const org = data.orgId ? this.getOrganization(data.orgId) : null;
      o.orgName = org ? org.name : "";
    }
    this.save();
    if (data.stage !== undefined && data.stage !== previousStage) {
      this._runStageAutomation(o, previousStage);
    }
  },

  // ================= Automation ================= //
  // "When a deal enters stage X (in pipeline Y), create a follow-up N days
  // later" -- a simplified version of a HubSpot workflow. Rules fire when an
  // opportunity is created directly into a matching stage, or moves into one.
  listAutomationRules() { return this.state.automationRules.slice(); },
  getAutomationRule(id) { return this.state.automationRules.find(r => r.id === id) || null; },

  addAutomationRule(data) {
    const rule = {
      id: uid("RULE"), pipeline: data.pipeline && PIPELINES[data.pipeline] ? data.pipeline : "Sales",
      stage: data.stage || "", daysOffset: parseInt(data.daysOffset) || 0,
      description: data.description || "", enabled: data.enabled !== undefined ? !!data.enabled : true,
      createdDate: todayStr(),
    };
    this.state.automationRules.push(rule);
    this.save();
    return rule.id;
  },

  updateAutomationRule(id, data) {
    const r = this.getAutomationRule(id);
    if (!r) throw new Error("Automation rule not found: " + id);
    const next = Object.assign({}, data);
    if (next.daysOffset !== undefined) next.daysOffset = parseInt(next.daysOffset) || 0;
    Object.assign(r, next);
    this.save();
  },

  deleteAutomationRule(id) {
    this.state.automationRules = this.state.automationRules.filter(r => r.id !== id);
    this.save();
  },

  _runStageAutomation(opp, previousStage) {
    const matches = this.state.automationRules.filter(r =>
      r.enabled && r.pipeline === opp.pipeline && r.stage === opp.stage
    );
    if (!matches.length) return;
    const contacts = opp.orgId ? this.contactsForOrg(opp.orgId) : [];
    const contactId = contacts.length ? contacts[0].id : "";
    matches.forEach(rule => {
      const due = new Date();
      due.setDate(due.getDate() + (rule.daysOffset || 0));
      this.addFollowUp({
        orgId: opp.orgId, contactId,
        dueDate: due.toISOString().slice(0, 10),
        description: `${rule.description} — ${opp.name}`,
        status: "Open", auto: true,
      });
    });
  },

  setOpportunityStage(id, stage) {
    const o = this.getOpportunity(id);
    if (!o) return;
    this.updateOpportunity(id, { stage, probability: defaultProbability(o.pipeline, stage) });
  },

  deleteOpportunity(id) {
    this.state.opportunities = this.state.opportunities.filter(o => o.id !== id);
    this.state.activities.forEach(a => { if (a.oppId === id) a.oppId = ""; });
    this.save();
  },

  // ================= Dashboard ================= //
  dashboardMetrics() {
    const orgs = this.listOrganizations();
    const contacts = this.listContacts();
    const opps = this.listOpportunities();
    const today = todayStr();

    const byType = {};
    orgs.forEach(o => { const t = o.type || "Unspecified"; byType[t] = (byType[t] || 0) + 1; });
    const decisionMakers = contacts.filter(c => c.decisionMaker).length;
    const recentOrgs = orgs.slice()
      .sort((a, b) => (b.createdDate || "").localeCompare(a.createdDate || ""))
      .slice(0, 5);

    // Total Pipeline / Expected Revenue / Win Rate are scoped to the Sales
    // pipeline specifically -- it's the only pipeline where "amount" reliably
    // means dollars of revenue. Other pipelines (Research, Partnership,
    // Funding, Feedback) track process, not sales revenue.
    const salesOpps = opps.filter(o => o.pipeline === "Sales");
    const salesPipeline = PIPELINES.Sales;
    const openSalesOpps = salesOpps.filter(o => o.stage !== salesPipeline.won && o.stage !== salesPipeline.lost);
    const totalPipeline = openSalesOpps.reduce((s, o) => s + (parseFloat(o.amount) || 0), 0);
    const expectedRevenue = openSalesOpps.reduce((s, o) => s + (parseFloat(o.amount) || 0) * (parseFloat(o.probability) || 0) / 100, 0);
    const closedWonCount = salesOpps.filter(o => o.stage === salesPipeline.won).length;
    const closedLostCount = salesOpps.filter(o => o.stage === salesPipeline.lost).length;
    const winRate = (closedWonCount + closedLostCount) > 0
      ? (closedWonCount / (closedWonCount + closedLostCount)) * 100
      : null;

    const oppsByPipeline = {};
    PIPELINE_NAMES.forEach(p => { oppsByPipeline[p] = 0; });
    opps.forEach(o => { oppsByPipeline[o.pipeline] = (oppsByPipeline[o.pipeline] || 0) + 1; });

    const activitiesDueToday = this.listActivities().filter(a => a.date === today).length;
    const openFollowUps = this.listFollowUps().filter(f => f.status !== "Done");
    const followUpsDueToday = openFollowUps.filter(f => f.dueDate === today).length;
    const followUpsOverdue = openFollowUps.filter(f => f.dueDate && f.dueDate < today).length;

    return {
      totalOrgs: orgs.length, totalContacts: contacts.length, decisionMakers,
      byType, recentOrgs,
      totalPipeline, expectedRevenue, oppsByPipeline, winRate,
      activitiesDueToday, followUpsDueToday, followUpsOverdue,
    };
  },

  replaceAll(data) {
    this.state = Object.assign(this._emptyState(), data);
    this.save();
  },
};

function renderSidebar() {
  const nav = byId("nav");
  nav.innerHTML = "";
  NAV_ITEMS.forEach(item => {
    const btn = document.createElement("button");
    btn.textContent = item.name;
    btn.onclick = () => showScreen(item.name);
    nav.appendChild(btn);
  });
}

function updateActiveNav() {
  const nav = byId("nav");
  [...nav.children].forEach((btn, i) => {
    btn.classList.toggle("active", NAV_ITEMS[i].name === currentScreen);
  });
}

function showScreen(name) {
  currentScreen = name;
  updateActiveNav();
  const content = byId("content");
  if (name === "Dashboard") content.innerHTML = renderDashboard();
  else if (name === "Organizations") { content.innerHTML = renderOrganizations(); afterRenderOrganizations(); }
  else if (name === "Contacts") { content.innerHTML = renderContacts(); afterRenderContacts(); }
  else if (name === "Pipelines") { content.innerHTML = renderOpportunities(); afterRenderOpportunities(); }
  else if (name === "Activities") { content.innerHTML = renderActivities(); afterRenderActivities(); }
  else if (name === "Follow Ups") { content.innerHTML = renderFollowUps(); afterRenderFollowUps(); }
  else if (name === "Pilot Programs") { content.innerHTML = renderPilotPrograms(); afterRenderPilotPrograms(); }
  else if (name === "Partnerships") { content.innerHTML = renderPartnerships(); afterRenderPartnerships(); }
  else if (name === "Grant Tracker") { content.innerHTML = renderGrantTracker(); afterRenderGrantTracker(); }
  else if (name === "Automations") { content.innerHTML = renderAutomations(); afterRenderAutomations(); }
  else if (name === "Reports") { content.innerHTML = renderReports(); afterRenderReports(); }
  else if (name === "Settings") { content.innerHTML = renderSettings(); afterRenderSettings(); }
  else content.innerHTML = renderComingSoon(name);
}

// Combines overdue + upcoming Activities and open Follow Ups into one
// dashboard "To Do" feed, sorted ascending by due date (most overdue /
// soonest due first).
function buildTodoListHtml() {
  const today = todayStr();

  const activityItems = Store.listActivities().map(a => ({
    dueDate: a.date, label: a.subject || a.type, typeLabel: a.type,
    orgId: a.orgId, contactId: a.contactId, screen: "Activities",
  }));
  const followUpItems = Store.listFollowUps()
    .filter(f => f.status !== "Done")
    .map(f => ({
      dueDate: f.dueDate, label: f.description || "Follow up", typeLabel: "Follow Up",
      orgId: f.orgId, contactId: f.contactId, screen: "Follow Ups",
    }));

  const items = activityItems.concat(followUpItems)
    .filter(item => !!item.dueDate)
    .sort((a, b) => a.dueDate.localeCompare(b.dueDate))
    .slice(0, 10);

  if (!items.length) return `<div class="muted-note">Nothing overdue or upcoming.</div>`;

  return `<div class="todo-list">${items.map(item => {
    const org = item.orgId ? Store.getOrganization(item.orgId) : null;
    const contact = item.contactId ? Store.getContact(item.contactId) : null;
    const who = [org ? org.name : "", contact ? contact.firstName + " " + contact.lastName : ""].filter(Boolean).join(" · ");
    const overdue = item.dueDate < today;
    const daysOverdue = overdue ? daysBetween(item.dueDate, today) : 0;
    const dateLabel = overdue
      ? (daysOverdue === 1 ? "1 day overdue" : daysOverdue + " days overdue")
      : item.dueDate;
    return `
      <div class="todo-item" tabindex="0" title="Go to ${escapeHtml(item.screen)}" onclick="showScreen('${item.screen}')" onkeydown="if(event.key==='Enter')showScreen('${item.screen}')">
        <div class="todo-top">
          <span class="todo-desc">${escapeHtml(item.label)}</span>
          <span class="todo-date ${overdue ? "overdue" : ""}" title="${escapeHtml(item.dueDate)}">${escapeHtml(dateLabel)}</span>
        </div>
        <div class="todo-meta">
          <span class="todo-type-pill" style="background:${todoTypeColor(item.typeLabel)}">${escapeHtml(item.typeLabel)}</span>
          ${who ? `<span class="todo-who">${escapeHtml(who)}</span>` : ""}
        </div>
      </div>
    `;
  }).join("")}</div>`;
}

  byId("opp-view-kanban").addEventListener("click", () => { oppScreenState.view = "kanban"; refreshCurrentScreen(); });
  byId("opp-view-table").addEventListener("click", () => { oppScreenState.view = "table"; refreshCurrentScreen(); });
  byId("opp-add-btn").addEventListener("click", () => openOppModal(null));
  renderOppForecast();
  renderOppBody();
}

function filteredOpportunities() {
  let opps = Store.listOpportunities().filter(o => o.pipeline === oppScreenState.pipeline);
  if (oppScreenState.stageFilter && oppScreenState.stageFilter !== "All Stages") {
    opps = opps.filter(o => o.stage === oppScreenState.stageFilter);
  }
  const q = oppScreenState.search.trim().toLowerCase();
  if (q) opps = opps.filter(o => Object.values(o).join(" ").toLowerCase().includes(q));
  return opps;
}

function renderOppForecast() {
  const el = byId("opp-forecast");
  if (!el) return;
  const pipeline = pipelineOf(oppScreenState.pipeline);
  const opps = Store.listOpportunities().filter(o => o.pipeline === oppScreenState.pipeline);
  const open = opps.filter(o => o.stage !== pipeline.won && o.stage !== pipeline.lost);
  const totalPipeline = open.reduce((s, o) => s + (parseFloat(o.amount) || 0), 0);
  const weighted = open.reduce((s, o) => s + (parseFloat(o.amount) || 0) * (parseFloat(o.probability) || 0) / 100, 0);
  const won = opps.filter(o => o.stage === pipeline.won).reduce((s, o) => s + (parseFloat(o.amount) || 0), 0);
  el.innerHTML = `
    <div class="forecast-chip"><span class="v">${money(totalPipeline)}</span>Total Value</div>
    <div class="forecast-chip"><span class="v">${money(weighted)}</span>Weighted Forecast</div>
    <div class="forecast-chip"><span class="v">${money(won)}</span>Won</div>
    <div class="forecast-chip"><span class="v">${open.length}</span>Open</div>
  `;
}

function renderOppBody() {
  const el = byId("opp-body");
  if (!el) return;
  el.innerHTML = oppScreenState.view === "kanban" ? renderOppKanbanHtml() : renderOppTableHtml();
  if (oppScreenState.view === "kanban") wireOppKanban();
  else wireOppTable();
}

function renderOppKanbanHtml() {
  const opps = filteredOpportunities();
  const stages = pipelineOf(oppScreenState.pipeline).stages;
  const cols = stages.map(stage => {
    const stageOpps = opps.filter(o => o.stage === stage);
    const cards = stageOpps.map(o => `
      <div class="kanban-card" data-id="${o.id}">
        <div class="name">${escapeHtml(o.name)}</div>
        <div class="org">${escapeHtml(o.orgName || "(no org)")}</div>
        <span class="amount">${money(o.amount)}</span><span class="prob">${o.probability || 0}%</span>
        <select class="opp-stage-select" data-id="${o.id}">
          ${stages.map(s => `<option value="${escapeHtml(s)}" ${s === o.stage ? "selected" : ""}>${escapeHtml(s)}</option>`).join("")}
        </select>
        <div class="kanban-card-actions">
          <button class="btn tiny outline opp-edit-btn" data-id="${o.id}">Edit</button>
          <button class="btn tiny danger opp-delete-btn" data-id="${o.id}">Delete</button>
        </div>
      </div>
    `).join("");
    return `
      <div class="kanban-col">
        <div class="kanban-col-header"><span>${escapeHtml(stage)}</span><span class="count">${stageOpps.length}</span></div>
        <div class="kanban-cards">${cards || '<div class="muted-note">No opportunities.</div>'}</div>
      </div>
    `;
  }).join("");
  return `<div class="kanban-board">${cols}</div>`;
}

function wireOppKanban() {
  const el = byId("opp-body");
  [...el.querySelectorAll(".opp-stage-select")].forEach(sel => {
    sel.addEventListener("change", e => {
      Store.setOpportunityStage(sel.getAttribute("data-id"), sel.value);
      renderOppForecast();
      renderOppBody();
      showToast("Stage updated.");
    });
  });
  [...el.querySelectorAll(".opp-edit-btn")].forEach(btn => {
    btn.addEventListener("click", e => { e.stopPropagation(); openOppModal(btn.getAttribute("data-id")); });
  });
  [...el.querySelectorAll(".opp-delete-btn")].forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const id = btn.getAttribute("data-id");
      if (confirm("Delete this opportunity?")) {
        Store.deleteOpportunity(id);
        renderOppForecast();
        renderOppBody();
        showToast("Opportunity deleted.");
      }
    });
  });
}

function renderOppTableHtml() {
  const opps = filteredOpportunities();
  const rows = opps.map(o => `
    <tr data-id="${o.id}">
      <td>${escapeHtml(o.name)}</td><td>${escapeHtml(o.orgName)}</td>
      <td><span class="badge" style="background:${stageColor(o.pipeline, o.stage)}">${escapeHtml(o.stage)}</span></td>
      <td>${money(o.amount)}</td><td>${o.probability || 0}%</td><td>${escapeHtml(o.expectedCloseDate)}</td>
      <td>${escapeHtml(o.source)}</td>

        <button class="btn small outline opp-edit-btn" data-id="${o.id}">Edit</button>

      </td>
    </tr>
  `).join("") || `<tr><td colspan="8" class="muted-note">No opportunities match.</td></tr>`;

  return `
    <div style="padding:4px 28px 20px;">
      <div class="card" style="padding:0;">
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>Name</th><th>Organization</th><th>Stage</th><th>Amount</th><th>Probability</th><th>Expected Close</th><th>Source</th><th></th></tr></thead>
            <tbody id="opp-table-body">${rows}</tbody>
          </table>
        </div>

    </div>

function wireOppTable() {
  const el = byId("opp-body");
  [...el.querySelectorAll(".opp-edit-btn")].forEach(btn => {
    btn.addEventListener("click", e => { e.stopPropagation(); openOppModal(btn.getAttribute("data-id")); });
  });
  [...el.querySelectorAll(".opp-delete-btn")].forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const id = btn.getAttribute("data-id");
      if (confirm("Delete this opportunity?")) {
        Store.deleteOpportunity(id);
        renderOppForecast();
        renderOppBody();
        showToast("Opportunity deleted.");
      }
    });

}

function openOppModal(oppId) {
  const opp = oppId ? Store.getOpportunity(oppId) : null;
  const pipeline = opp ? opp.pipeline : oppScreenState.pipeline;
  const pipelineOptions = PIPELINE_NAMES.map(p =>
    `<option value="${escapeHtml(p)}" ${p === pipeline ? "selected" : ""}>${escapeHtml(p)}</option>`
  ).join("");
  const stageOptions = pipelineOf(pipeline).stages.map(s =>
    `<option value="${escapeHtml(s)}" ${opp && opp.stage === s ? "selected" : ""}>${escapeHtml(s)}</option>`
  ).join("");

  byId("modal-body").innerHTML = `
    <h2>${opp ? "Edit Opportunity" : "Add Opportunity"}</h2>
    <div class="field-group"><label>Organization</label><select id="f-org">${orgOptionsHtml(opp ? opp.orgId : "", true)}</select></div>
    <div class="field-group"><label>Name</label><input type="text" id="f-name" value="${escapeHtml(opp ? opp.name : "")}"></div>
    <div class="field-row">
      <div class="field-group"><label>Pipeline</label><select id="f-pipeline">${pipelineOptions}</select></div>
      <div class="field-group"><label>Stage</label><select id="f-stage">${stageOptions}</select></div>
    </div>
    <div class="field-row">
      <div class="field-group"><label>Probability (%)</label><input type="number" id="f-prob" min="0" max="100" value="${opp ? opp.probability : defaultProbability(pipeline, pipelineOf(pipeline).stages[0])}"></div>
      <div class="field-group"><label>Amount ($)</label><input type="number" id="f-amount" min="0" value="${opp ? opp.amount : ""}"></div>
    </div>
    <div class="field-group"><label>Expected Close Date</label><input type="date" id="f-close" value="${escapeHtml(opp ? opp.expectedCloseDate : "")}"></div>
    <div class="field-group"><label>Source</label><input type="text" id="f-source" placeholder="Referral, Website, Conference..." value="${escapeHtml(opp ? opp.source : "")}"></div>
    <div class="field-group"><label>Notes</label><textarea id="f-notes" rows="3">${escapeHtml(opp ? opp.notes : "")}</textarea></div>
    <div class="modal-actions">
      <button class="btn secondary" id="modal-cancel">Cancel</button>
      <button class="btn" id="modal-save">Save</button>
    </div>
  `;
  openModal();

  byId("f-pipeline").addEventListener("change", () => {
    const newPipeline = byId("f-pipeline").value;
    const stages = pipelineOf(newPipeline).stages;
    byId("f-stage").innerHTML = stages.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("");
    byId("f-prob").value = defaultProbability(newPipeline, stages[0]);
  });
  byId("f-stage").addEventListener("change", () => {
    byId("f-prob").value = defaultProbability(byId("f-pipeline").value, byId("f-stage").value);
  });
  byId("modal-cancel").addEventListener("click", closeModal);
  byId("modal-save").addEventListener("click", () => {
    const data = {
      orgId: byId("f-org").value,
      name: byId("f-name").value.trim(),
      pipeline: byId("f-pipeline").value,
      stage: byId("f-stage").value,
      probability: byId("f-prob").value,
      amount: byId("f-amount").value,
      expectedCloseDate: byId("f-close").value,
      source: byId("f-source").value.trim(),
      notes: byId("f-notes").value.trim(),
    };
    if (!data.name) { alert("Opportunity name is required."); return; }
    if (opp) Store.updateOpportunity(opp.id, data);
    else Store.addOpportunity(data);
    oppScreenState.pipeline = data.pipeline;
    closeModal();
    refreshCurrentScreen();
    showToast(opp ? "Opportunity updated." : "Opportunity added.");
  });
}

function renderFollowUps() {
  return `
    <div class="header">
      <h1>Follow Ups</h1>
      <p>Stay on top of what's due.</p>
    </div>
    <div class="toolbar">
      <div class="spacer"></div>
      <button class="btn" id="followup-add-btn">+ Add Follow Up</button>
    </div>
    <div id="followup-body"></div>
  `;
}

function afterRenderFollowUps() {
  byId("followup-add-btn").addEventListener("click", () => openFollowUpModal(null));
  renderFollowUpBody();
}

function followUpGroupHtml(title, cssClass, items) {
  if (!items.length) return "";
  const rows = items.map(f => {
    const org = f.orgId ? Store.getOrganization(f.orgId) : null;
    const contact = f.contactId ? Store.getContact(f.contactId) : null;
    const who = [org ? org.name : "", contact ? contact.firstName + " " + contact.lastName : ""].filter(Boolean).join(" · ");
    return `
      <div class="fu-item ${f.status === "Done" ? "done" : ""}" data-id="${f.id}">
        <input type="checkbox" class="fu-toggle" data-id="${f.id}" ${f.status === "Done" ? "checked" : ""}>
        <span class="fu-desc">${f.auto ? '<span class="badge" style="background:var(--purple);margin-right:6px;" title="Created automatically by a rule">Automated</span>' : ""}${escapeHtml(f.description)}${who ? " — " + escapeHtml(who) : ""}</span>
        <span class="fu-meta">${escapeHtml(f.dueDate)}</span>
        <button class="btn tiny outline fu-edit-btn" data-id="${f.id}">Edit</button>
        <button class="btn tiny danger fu-delete-btn" data-id="${f.id}">Delete</button>
      </div>
    `;
  }).join("");
  return `
    <div class="fu-group-title ${cssClass}"><span>${title}</span><span class="count-pill">${items.length}</span></div>
    <div class="fu-list">${rows}</div>
  `;
}

function renderFollowUpBody() {
  const el = byId("followup-body");
  if (!el) return;
  const today = todayStr();
  const all = Store.listFollowUps().slice().sort((a, b) => (a.dueDate || "").localeCompare(b.dueDate || ""));
  const open = all.filter(f => f.status !== "Done");
  const done = all.filter(f => f.status === "Done");
  const overdue = open.filter(f => f.dueDate && f.dueDate < today);
  const dueToday = open.filter(f => f.dueDate === today);
  const upcoming = open.filter(f => f.dueDate && f.dueDate > today);
  const noDate = open.filter(f => !f.dueDate);

  el.innerHTML =
    followUpGroupHtml("Overdue", "overdue", overdue) +
    followUpGroupHtml("Due Today", "today", dueToday) +
    followUpGroupHtml("Upcoming", "", upcoming.concat(noDate)) +
    followUpGroupHtml("Done", "", done) +
    (all.length === 0 ? `<div class="muted-note" style="padding:0 28px;">No follow-ups yet.</div>` : "");

  [...el.querySelectorAll(".fu-toggle")].forEach(cb => {
    cb.addEventListener("change", () => {
      Store.toggleFollowUpStatus(cb.getAttribute("data-id"));
      renderFollowUpBody();
      showToast("Follow-up updated.");
    });
  });
  [...el.querySelectorAll(".fu-edit-btn")].forEach(btn => {
    btn.addEventListener("click", () => openFollowUpModal(btn.getAttribute("data-id")));
  });
  [...el.querySelectorAll(".fu-delete-btn")].forEach(btn => {
    btn.addEventListener("click", () => {
      if (confirm("Delete this follow-up?")) {
        Store.deleteFollowUp(btn.getAttribute("data-id"));
        renderFollowUpBody();
        showToast("Follow-up deleted.");
      }
    });
  });
}

function openFollowUpModal(followUpId) {
  const fu = followUpId ? Store.getFollowUp(followUpId) : null;

  byId("modal-body").innerHTML = `
    <h2>${fu ? "Edit Follow Up" : "Add Follow Up"}</h2>
    <div class="field-group"><label>Organization</label><select id="f-org">${orgOptionsHtml(fu ? fu.orgId : "", true)}</select></div>
    <div class="field-group"><label>Contact</label><select id="f-contact">${contactOptionsHtml(fu ? fu.orgId : "", fu ? fu.contactId : "")}</select></div>
    <div class="field-group"><label>Due Date</label><input type="date" id="f-due" value="${escapeHtml(fu ? fu.dueDate : todayStr())}"></div>
    <div class="field-group"><label>Description</label><textarea id="f-desc" rows="2">${escapeHtml(fu ? fu.description : "")}</textarea></div>
    <div class="checkbox-row">
      <input type="checkbox" id="f-done" ${fu && fu.status === "Done" ? "checked" : ""}>
      <label for="f-done" style="margin:0;">Done</label>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" id="modal-cancel">Cancel</button>
      <button class="btn" id="modal-save">Save</button>
    </div>
  `;
  openModal();

  byId("f-org").addEventListener("change", () => {
    byId("f-contact").innerHTML = contactOptionsHtml(byId("f-org").value, "");
  });

  byId("modal-cancel").addEventListener("click", closeModal);
  byId("modal-save").addEventListener("click", () => {
    const data = {
      orgId: byId("f-org").value,
      contactId: byId("f-contact").value,
      dueDate: byId("f-due").value || todayStr(),
      description: byId("f-desc").value.trim(),

    if (!data.description) { alert("Description is required."); return; }
    if (fu) Store.updateFollowUp(fu.id, data);
    else Store.addFollowUp(data);
    closeModal();
    renderFollowUpBody();
    showToast(fu ? "Follow-up updated." : "Follow-up added.");
  });
}

function renderPilotGrid() {

    grid.innerHTML = `<div class="muted-note">No pilot programs yet.</div>`;

  }
  grid.innerHTML = pilots.map(p => {
    const pct = p.targetParticipants > 0 ? Math.min(100, Math.round((p.participantCount / p.targetParticipants) * 100)) : 0;
    const doneCount = (p.milestones || []).filter(m => m.done).length;
    return `
      <div class="pilot-card" data-id="${p.id}">
        <div class="top-row">
          <div>
            <div class="name">${escapeHtml(p.name)}</div>

        </div>
        <div class="stat-line">Participants: ${p.participantCount} / ${p.targetParticipants || "?"}</div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="stat-line">${escapeHtml(p.startDate || "?")} → ${escapeHtml(p.endDate || "?")}</div>
        <div class="stat-line">Milestones: ${doneCount}/${(p.milestones || []).length} complete</div>
        <div class="actions">
          <button class="btn small outline pilot-edit-btn" data-id="${p.id}">Edit</button>
          <button class="btn small danger pilot-delete-btn" data-id="${p.id}">Delete</button>
        </div>
      </div>
    `;
  }).join("");

  [...grid.querySelectorAll(".pilot-edit-btn")].forEach(btn => {
    btn.addEventListener("click", () => openPilotModal(btn.getAttribute("data-id")));
  });

  [...wrap.querySelectorAll(".ms-toggle")].forEach(cb => {

      const m = modalMilestones.find(x => x.id === cb.getAttribute("data-id"));

function barChartHtml(entries, opts) {
  opts = opts || {};
  const max = Math.max(1, ...entries.map(e => e.value));
  if (!entries.length) return `<div class="muted-note">No data yet.</div>`;
  return entries.map(e => `
    <div class="chart-row">
      <div class="chart-label">${escapeHtml(e.label)}</div>
      <div class="chart-track"><div class="chart-fill" style="width:${Math.max(2, Math.round((e.value / max) * 100))}%; background:${e.color || 'var(--accent)'}"></div></div>
      <div class="chart-value">${opts.money ? money(e.value) : e.value}</div>
    </div>
  `).join("");
}

function renderReports() {
  const allOpps = Store.listOpportunities();
  const reportPipeline = pipelineOf(reportsScreenState.pipeline);
  const pipelineOpps = allOpps.filter(o => o.pipeline === reportsScreenState.pipeline);

  const pipelineEntries = reportPipeline.stages.map(stage => ({
    label: stage, value: pipelineOpps.filter(o => o.stage === stage).reduce((s, o) => s + (parseFloat(o.amount) || 0), 0),
    color: stageColor(reportsScreenState.pipeline, stage),
  }));

  // Revenue / Sales by Month / Lead Sources are scoped to the Sales pipeline,
  // since that's the only pipeline where "amount" means dollars of revenue.
  const salesOpps = allOpps.filter(o => o.pipeline === "Sales");
  const closedWon = salesOpps.filter(o => o.stage === PIPELINES.Sales.won);
  const totalRevenue = closedWon.reduce((s, o) => s + (parseFloat(o.amount) || 0), 0);
  const revenueByMonth = {};
  closedWon.forEach(o => {
    const key = monthKey(o.expectedCloseDate) || monthKey(o.createdDate);
    if (key) revenueByMonth[key] = (revenueByMonth[key] || 0) + (parseFloat(o.amount) || 0);
  });
  const revenueEntries = Object.keys(revenueByMonth).sort().map(k => ({ label: monthLabel(k), value: revenueByMonth[k] }));

  const salesByMonth = {};
  salesOpps.forEach(o => {
    const key = monthKey(o.createdDate);
    if (key) salesByMonth[key] = (salesByMonth[key] || 0) + 1;
  });
  const salesEntries = Object.keys(salesByMonth).sort().map(k => ({ label: monthLabel(k), value: salesByMonth[k] }));

  const bySource = {};
  salesOpps.forEach(o => {
    const s = o.source || "Unspecified";
    bySource[s] = (bySource[s] || 0) + 1;
  });
  const sourceEntries = Object.entries(bySource).sort((a, b) => b[1] - a[1]).map(([label, value]) => ({ label, value }));

  const pipelineSelectOptions = PIPELINE_NAMES.map(p =>
    `<option value="${escapeHtml(p)}" ${p === reportsScreenState.pipeline ? "selected" : ""}>${escapeHtml(p)}</option>`
  ).join("");

  return `
    <div class="header">
      <h1>Reports</h1>
      <p>Pipeline, revenue, and lead-source trends.</p>
    </div>
    <div class="report-section reports-grid">
      <div class="card">
        <h3>Pipeline by Stage</h3>
        <select id="report-pipeline-select" style="margin-bottom:8px;">${pipelineSelectOptions}</select>
        ${barChartHtml(pipelineEntries, { money: true })}
      </div>
      <div class="card">
        <h3>Revenue (Closed Won: ${money(totalRevenue)})</h3>
        <div class="card-caption">Sales pipeline only</div>
        ${barChartHtml(revenueEntries, { money: true })}
      </div>
      <div class="card">
        <h3>Sales by Month (opportunities created)</h3>
        <div class="card-caption">Sales pipeline only</div>
        ${barChartHtml(salesEntries)}
      </div>
      <div class="card">
        <h3>Lead Sources</h3>
        <div class="card-caption">Sales pipeline only</div>
        ${barChartHtml(sourceEntries)}
      </div>
    </div>
  `;
}

function afterRenderReports() {

// Settings (Export / Import / backup)
// ---------------------------------------------------------------- //
function renderSettings() {
  return `
    <div class="header">
      <h1>Settings</h1>
      <p>Backups and data management. Your data lives in this browser only until you export it.</p>
    </div>
    <div class="settings-block">
      <div class="card">
        <h3>Export to Excel</h3>
        <p>Download a real .xlsx file with everything — Organizations, Contacts, Opportunities, Activities,
        Follow-ups, Pilot Programs, Partnerships, Grants, and Automation Rules. Keep this file somewhere safe
        (Dropbox, iCloud, an external drive) as your backup.</p>
        <button class="btn" id="export-btn">Download MyCRM.xlsx</button>
      </div>
      <div class="card">
        <h3>Import from Excel</h3>
        <p>Load data from a previously exported .xlsx file. This replaces everything currently in the browser.</p>
        <input type="file" id="import-file" accept=".xlsx,.xls">
      </div>
      <div class="card">
        <h3>Clear All Data</h3>
        <p>Removes everything and reloads the sample data. This cannot be undone unless you've exported a backup first.</p>
        <button class="btn danger" id="clear-btn">Clear &amp; Reset</button>
      </div>
    </div>
  `;
}

function afterRenderSettings() {
  byId("export-btn").addEventListener("click", exportToExcel);
  byId("import-file").addEventListener("change", e => {
    const file = e.target.files[0];
    if (file) importFromExcel(file);
  });
  byId("clear-btn").addEventListener("click", () => {
    if (confirm("Clear all data and reload sample data? This cannot be undone.")) {
      localStorage.removeItem(STORAGE_KEY);
      Store.load();
      showToast("Data cleared and reset.");
      refreshCurrentScreen();
    }
  });
}

const SHEET_COLUMNS = {
  Organizations: ["OrgID","Name","Type","Industry","Address","City","State","Zip","Phone","Website","Notes","CreatedDate","LastContactDate"],
  Contacts: ["ContactID","OrgID","OrgName","FirstName","LastName","Title","Email","Phone","DecisionMaker","Notes","CreatedDate","LastContactDate"],
  Opportunities: ["OppID","OrgID","OrgName","Pipeline","Name","Stage","Amount","Probability","ExpectedCloseDate","Source","Notes","CreatedDate"],
  Activities: ["ActivityID","OrgID","ContactID","OppID","Type","Date","Subject","Notes"],
  FollowUps: ["FollowUpID","OrgID","ContactID","DueDate","Description","Status","Auto","CreatedDate"],
  PilotPrograms: ["PilotID","OrgID","OrgName","Name","Status","StartDate","EndDate","ParticipantCount","TargetParticipants","Notes","MilestonesJSON","CreatedDate"],
  Partnerships: ["PartnershipID","OrgID","OrgName","Type","Status","StartDate","Notes","CreatedDate"],
  Grants: ["GrantID","Name","Funder","Amount","Status","Deadline","OrgID","OrgName","Notes","CreatedDate"],
  AutomationRules: ["RuleID","Pipeline","Stage","DaysOffset","Description","Enabled","CreatedDate"],
};

function exportToExcel() {
  if (typeof XLSX === "undefined") {
    alert("Couldn't load the Excel library (no internet connection?). Try again when you're online.");
    return;
  }
  const orgRows = Store.listOrganizations().map(o => ({
    OrgID: o.id, Name: o.name, Type: o.type, Industry: o.industry, Address: o.address,
    City: o.city, State: o.state, Zip: o.zip, Phone: o.phone, Website: o.website,
    Notes: o.notes, CreatedDate: o.createdDate, LastContactDate: o.lastContactDate,
  }));
  const contactRows = Store.listContacts().map(c => ({
    ContactID: c.id, OrgID: c.orgId, OrgName: c.orgName, FirstName: c.firstName, LastName: c.lastName,
    Title: c.title, Email: c.email, Phone: c.phone, DecisionMaker: c.decisionMaker ? "Y" : "N",
    Notes: c.notes, CreatedDate: c.createdDate, LastContactDate: c.lastContactDate,
  }));
  const oppRows = Store.listOpportunities().map(o => ({
    OppID: o.id, OrgID: o.orgId, OrgName: o.orgName, Pipeline: o.pipeline, Name: o.name, Stage: o.stage, Amount: o.amount,
    Probability: o.probability, ExpectedCloseDate: o.expectedCloseDate, Source: o.source, Notes: o.notes,
    CreatedDate: o.createdDate,
  }));
  const activityRows = Store.listActivities().map(a => ({
    ActivityID: a.id, OrgID: a.orgId, ContactID: a.contactId, OppID: a.oppId, Type: a.type,
    Date: a.date, Subject: a.subject, Notes: a.notes,
  }));
  const followUpRows = Store.listFollowUps().map(f => ({
    FollowUpID: f.id, OrgID: f.orgId, ContactID: f.contactId, DueDate: f.dueDate,
    Description: f.description, Status: f.status, Auto: f.auto ? "Y" : "N", CreatedDate: f.createdDate,
  }));
  const pilotRows = Store.listPilots().map(p => ({
    PilotID: p.id, OrgID: p.orgId, OrgName: p.orgName, Name: p.name, Status: p.status,
    StartDate: p.startDate, EndDate: p.endDate, ParticipantCount: p.participantCount,
    TargetParticipants: p.targetParticipants, Notes: p.notes,
    MilestonesJSON: JSON.stringify(p.milestones || []), CreatedDate: p.createdDate,
  }));
  const partnershipRows = Store.listPartnerships().map(p => ({
    PartnershipID: p.id, OrgID: p.orgId, OrgName: p.orgName, Type: p.type, Status: p.status,
    StartDate: p.startDate, Notes: p.notes, CreatedDate: p.createdDate,
  }));
  const grantRows = Store.listGrants().map(g => ({
    GrantID: g.id, Name: g.name, Funder: g.funder, Amount: g.amount, Status: g.status,
    Deadline: g.deadline, OrgID: g.orgId, OrgName: g.orgName, Notes: g.notes, CreatedDate: g.createdDate,
  }));
  const ruleRows = Store.listAutomationRules().map(r => ({
    RuleID: r.id, Pipeline: r.pipeline, Stage: r.stage, DaysOffset: r.daysOffset,
    Description: r.description, Enabled: r.enabled ? "Y" : "N", CreatedDate: r.createdDate,
  }));

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(orgRows, { header: SHEET_COLUMNS.Organizations }), "Organizations");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(contactRows, { header: SHEET_COLUMNS.Contacts }), "Contacts");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(oppRows, { header: SHEET_COLUMNS.Opportunities }), "Opportunities");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(activityRows, { header: SHEET_COLUMNS.Activities }), "Activities");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(followUpRows, { header: SHEET_COLUMNS.FollowUps }), "FollowUps");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(pilotRows, { header: SHEET_COLUMNS.PilotPrograms }), "PilotPrograms");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(partnershipRows, { header: SHEET_COLUMNS.Partnerships }), "Partnerships");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(grantRows, { header: SHEET_COLUMNS.Grants }), "Grants");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ruleRows, { header: SHEET_COLUMNS.AutomationRules }), "AutomationRules");

  XLSX.writeFile(wb, "MyCRM.xlsx");
  showToast("Exported MyCRM.xlsx");
}

function importFromExcel(file) {
  if (typeof XLSX === "undefined") {
    alert("Couldn't load the Excel library (no internet connection?). Try again when you're online.");
    return;
  }
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const data = new Uint8Array(evt.target.result);
      const wb = XLSX.read(data, { type: "array" });
      const sheetRows = name => wb.Sheets[name] ? XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: "" }) : [];

      const orgRows = sheetRows("Organizations");
      const contactRows = sheetRows("Contacts");
      const oppRows = sheetRows("Opportunities");
      const activityRows = sheetRows("Activities");
      const followUpRows = sheetRows("FollowUps");
      const pilotRows = sheetRows("PilotPrograms");
      const partnershipRows = sheetRows("Partnerships");
      const grantRows = sheetRows("Grants");
      const ruleRows = sheetRows("AutomationRules");

      if (!orgRows.length && !contactRows.length) {
        alert("This file doesn't have Organizations or Contacts sheets.");
        return;
      }

      const organizations = orgRows.map(r => ({
        id: String(r.OrgID || uid("ORG")), name: r.Name || "", type: r.Type || "", industry: r.Industry || "",
        address: r.Address || "", city: r.City || "", state: r.State || "", zip: String(r.Zip || ""),
        phone: String(r.Phone || ""), website: r.Website || "", notes: r.Notes || "",
        createdDate: String(r.CreatedDate || todayStr()), lastContactDate: String(r.LastContactDate || ""),
      }));
      const contacts = contactRows.map(r => ({
        id: String(r.ContactID || uid("CON")), orgId: String(r.OrgID || ""), orgName: r.OrgName || "",
        firstName: r.FirstName || "", lastName: r.LastName || "", title: r.Title || "",
        email: r.Email || "", phone: String(r.Phone || ""),
        decisionMaker: String(r.DecisionMaker || "").toLowerCase().startsWith("y"),
        notes: r.Notes || "", createdDate: String(r.CreatedDate || todayStr()), lastContactDate: String(r.LastContactDate || ""),
      }));
      const opportunities = oppRows.map(r => {
        const pipeline = r.Pipeline && PIPELINES[r.Pipeline] ? r.Pipeline : "Sales";
        return {
          id: String(r.OppID || uid("OPP")), orgId: String(r.OrgID || ""), orgName: r.OrgName || "",
          pipeline, name: r.Name || "", stage: r.Stage || pipelineOf(pipeline).stages[0], amount: parseFloat(r.Amount) || 0,
          probability: parseFloat(r.Probability) || 0, expectedCloseDate: String(r.ExpectedCloseDate || ""),
          source: r.Source || "", notes: r.Notes || "", createdDate: String(r.CreatedDate || todayStr()),
        };
      });
      const activities = activityRows.map(r => ({
        id: String(r.ActivityID || uid("ACT")), orgId: String(r.OrgID || ""), contactId: String(r.ContactID || ""),
        oppId: String(r.OppID || ""), type: r.Type || ACTIVITY_TYPES[0], date: String(r.Date || todayStr()),
        subject: r.Subject || "", notes: r.Notes || "",
      }));
      const followUps = followUpRows.map(r => ({
        id: String(r.FollowUpID || uid("FUP")), orgId: String(r.OrgID || ""), contactId: String(r.ContactID || ""),
        dueDate: String(r.DueDate || ""), description: r.Description || "", status: r.Status || "Open",
        auto: String(r.Auto || "").toLowerCase().startsWith("y"),
        createdDate: String(r.CreatedDate || todayStr()),
      }));
      const pilots = pilotRows.map(r => {
        let milestones = [];
        try { milestones = JSON.parse(r.MilestonesJSON || "[]"); } catch (e) { milestones = []; }
        return {
          id: String(r.PilotID || uid("PIL")), orgId: String(r.OrgID || ""), orgName: r.OrgName || "",
          name: r.Name || "", status: r.Status || PILOT_STATUS[0], startDate: String(r.StartDate || ""),
          endDate: String(r.EndDate || ""), participantCount: parseInt(r.ParticipantCount) || 0,
          targetParticipants: parseInt(r.TargetParticipants) || 0, notes: r.Notes || "",
          milestones, createdDate: String(r.CreatedDate || todayStr()),
        };
      });
      const partnerships = partnershipRows.map(r => ({
        id: String(r.PartnershipID || uid("PART")), orgId: String(r.OrgID || ""), orgName: r.OrgName || "",
        type: r.Type || PARTNERSHIP_TYPES[0], status: r.Status || PARTNERSHIP_STATUS[0],
        startDate: String(r.StartDate || ""), notes: r.Notes || "", createdDate: String(r.CreatedDate || todayStr()),
      }));
      const grants = grantRows.map(r => ({
        id: String(r.GrantID || uid("GRANT")), name: r.Name || "", funder: r.Funder || "",
        amount: parseFloat(r.Amount) || 0, status: r.Status || GRANT_STATUS[0], deadline: String(r.Deadline || ""),
        orgId: String(r.OrgID || ""), orgName: r.OrgName || "", notes: r.Notes || "",
        createdDate: String(r.CreatedDate || todayStr()),
      }));
      const automationRules = ruleRows.map(r => ({
        id: String(r.RuleID || uid("RULE")), pipeline: r.Pipeline && PIPELINES[r.Pipeline] ? r.Pipeline : "Sales",
        stage: r.Stage || "", daysOffset: parseInt(r.DaysOffset) || 0, description: r.Description || "",
        enabled: String(r.Enabled || "Y").toLowerCase().startsWith("y"),
        createdDate: String(r.CreatedDate || todayStr()),
      }));

      const counts = `${organizations.length} organization(s), ${contacts.length} contact(s), ${opportunities.length} opportunit(y/ies), ` +
        `${activities.length} activit(y/ies), ${followUps.length} follow-up(s), ${pilots.length} pilot(s), ` +
        `${partnerships.length} partnership(s), ${grants.length} grant(s), ${automationRules.length} automation rule(s)`;
      if (!confirm(`Import ${counts}? This replaces all current data.`)) return;

      Store.replaceAll({ organizations, contacts, opportunities, activities, followUps, pilots, partnerships, grants, automationRules });
      showToast("Import complete.");
      refreshCurrentScreen();
    } catch (err) {
      alert("Couldn't read that file: " + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

  document.addEventListener("click", e => {

  });
}
